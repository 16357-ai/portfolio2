<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portfolio | ทิตชญา ฑีฆะไพบูลย์</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Prompt',sans-serif;
scroll-behavior:smooth;
}

body{
background:linear-gradient(135deg,#f7fff8,#e8f5e9);
overflow-x:hidden;
}

/* Background */

.blur1{
position:absolute;
width:350px;
height:350px;
background:#81c784;
filter:blur(120px);
top:-100px;
left:-100px;
opacity:.4;
z-index:-1;
}

.blur2{
position:absolute;
width:300px;
height:300px;
background:#66bb6a;
filter:blur(120px);
bottom:-80px;
right:-80px;
opacity:.3;
z-index:-1;
}

/* Navbar */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
position:fixed;
width:100%;
background:rgba(255,255,255,.8);
backdrop-filter:blur(10px);
box-shadow:0 3px 15px rgba(0,0,0,.08);
z-index:999;
}

.logo{
font-size:28px;
font-weight:700;
color:#2e7d32;
}

nav ul{
display:flex;
gap:30px;
list-style:none;
}

nav a{
text-decoration:none;
color:#2e7d32;
font-weight:500;
transition:.3s;
}

nav a:hover{
color:#66bb6a;
}

/* Hero */

.hero{
display:flex;
justify-content:space-between;
align-items:center;
min-height:100vh;
padding:120px 8%;
gap:60px;
}

.text{
max-width:550px;
}

.text h3{
font-size:22px;
color:#43a047;
}

.text h1{
font-size:55px;
color:#1b5e20;
margin:15px 0;
}

.text p{
font-size:18px;
line-height:1.8;
margin-bottom:35px;
color:#444;
}

button{
padding:15px 35px;
border:none;
border-radius:50px;
background:#2e7d32;
color:white;
font-size:16px;
cursor:pointer;
transition:.3s;
box-shadow:0 10px 20px rgba(46,125,50,.3);
}

button:hover{
transform:translateY(-5px);
background:#388e3c;
box-shadow:0 15px 30px rgba(46,125,50,.4);
}

/* Profile */

.profile img{
width:320px;
height:320px;
object-fit:cover;
border-radius:50%;
border:8px solid white;
box-shadow:0 15px 35px rgba(0,0,0,.15);
animation:float 3s ease-in-out infinite;
}

@keyframes float{

0%{
transform:translateY(0);
}

50%{
transform:translateY(-15px);
}

100%{
transform:translateY(0);
}

}

/* Scroll */

.arrow{

position:absolute;

bottom:30px;

left:50%;

transform:translateX(-50%);

font-size:35px;

color:#2e7d32;

animation:down 1.5s infinite;

}

@keyframes down{

0%{transform:translate(-50%,0);}

50%{transform:translate(-50%,10px);}

100%{transform:translate(-50%,0);}

}

/* Responsive */

@media(max-width:900px){

.hero{

flex-direction:column-reverse;

text-align:center;

}

.text h1{

font-size:40px;

}

.profile img{

width:240px;

height:240px;

}

nav{

flex-direction:column;

gap:15px;

}

nav ul{

gap:18px;

flex-wrap:wrap;

justify-content:center;

}

}

</style>

</head>

<body>

<div class="blur1"></div>
<div class="blur2"></div>

<nav>

<div class="logo">Portfolio</div>

<ul>

<li><a href="#">Home</a></li>
<li><a href="#">About</a></li>
<li><a href="#">Education</a></li>
<li><a href="#">Projects</a></li>
<li><a href="#">Contact</a></li>

</ul>

</nav>

<section class="hero">

<div class="text">

<h3 id="typing"></h3>

<h1>ทิตชญา ฑีฆะไพบูลย์</h1>

<p>

นักเรียนชั้นมัธยมศึกษาปีที่ 6 <br>

มีความสนใจด้านการออกแบบเว็บไซต์และการพัฒนาโปรแกรม <br>

ยินดีต้อนรับสู่เว็บไซต์ Portfolio ของฉัน 🌿

</p>

<button onclick="location.href='projects.html'">

ดูผลงาน

</button>

</div>

<div class="profile">

<img src="profile.jpg" alt="Profile">

</div>

</section>

<div class="arrow">⌄</div>

<script>

const text="สวัสดีค่ะ 👋";

let i=0;

function typing(){

if(i<text.length){

document.getElementById("typing").innerHTML+=text.charAt(i);

i++;

setTimeout(typing,120);

}

}

typing();

</script>

</body>
</html>
