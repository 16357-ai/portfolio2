<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ติดต่อ | ทิตชญา ฑีฆะไพบูลย์</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">


<style>

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:'Prompt',sans-serif;

}


body{

background:linear-gradient(135deg,#ffd6e7,#b8f2e6);

color:#2d6a4f;

}



/* Navbar */

header{

position:fixed;
top:0;

width:100%;

padding:20px 8%;

display:flex;

justify-content:space-between;

align-items:center;

background:rgba(255,255,255,.45);

backdrop-filter:blur(15px);

z-index:100;

}


.logo{

font-size:28px;

font-weight:bold;

color:#ff5f9e;

}



nav a{

text-decoration:none;

color:#2d6a4f;

margin-left:25px;

}



nav a:hover{

color:#ff5f9e;

}



/* Main */

.container{

width:85%;

margin:auto;

padding-top:120px;

}



.title{

text-align:center;

margin-bottom:50px;

}



.title h1{

font-size:45px;

color:#ff5f9e;

}




.contact-box{

display:grid;

grid-template-columns:1fr 1fr;

gap:40px;

}




.card{

background:rgba(255,255,255,.5);

backdrop-filter:blur(20px);

padding:40px;

border-radius:30px;

box-shadow:0 15px 30px rgba(0,0,0,.1);

}



.card h2{

color:#ff5f9e;

margin-bottom:20px;

}



/* Contact Info */


.contact-item{

display:flex;

align-items:center;

gap:15px;

margin:25px 0;

font-size:18px;

}


.icon{

font-size:35px;

}



/* Instagram Button */


.ig-btn{

display:inline-block;

padding:15px 35px;

border-radius:40px;

background:linear-gradient(45deg,#ff7eb3,#c77dff);

color:white;

text-decoration:none;

margin-top:20px;

transition:.3s;

}



.ig-btn:hover{

transform:translateY(-5px);

}




/* Form */


input,
textarea{

width:100%;

padding:15px;

margin:10px 0;

border:none;

border-radius:15px;

outline:none;

}



textarea{

height:120px;

resize:none;

}



.send{

width:100%;

padding:15px;

border:none;

border-radius:30px;

background:#8be3c5;

color:white;

font-size:17px;

cursor:pointer;

}



.send:hover{

background:#6acfa8;

}




footer{

margin-top:50px;

text-align:center;

padding:25px;

background:#ffffff88;

}





@media(max-width:800px){

.contact-box{

grid-template-columns:1fr;

}


header{

flex-direction:column;

}


nav{

margin-top:15px;

}

}


</style>

</head>


<body>



<header>


<div class="logo">

🌸 Portfolio

</div>



<nav>

<a href="portfolio.html">ผลงาน</a>

<a href="contact.html">ติดต่อ</a>

</nav>


</header>

</div>

<div class="card">


<h2>🌷 ช่องทางการติดต่อ</h2>



<div class="contact-item">

<div class="icon">👩‍🎓</div>

<div>

<strong>ชื่อ</strong>

<br>

ทิตชญา ฑีฆะไพบูลย์ (นิว)

</div>

</div>




<div class="contact-item">

<div class="icon">🏫</div>

<div>

<strong>โรงเรียน</strong>

<br>

โรงเรียนพานทอง

</div>

</div>





<div class="contact-item">

<div class="icon">📚</div>

<div>

<strong>แผนการเรียน</strong>

<br>

วิทยาศาสตร์ - คณิตศาสตร์

</div>

</div>




<a class="ig-btn"
href="https://www.instagram.com/nnewij"
target="_blank">

📷 Instagram : @nnewij

</a>



</div>






<div class="card">


<h2>💌 ส่งข้อความ</h2>


<form>

placeholder="ชื่อของคุณ">

placeholder="อีเมล">

</textarea>


<button class="send">

ส่งข้อความ

</button>


</form>



</div>




</div>



</div>





<footer>

🌸 Thank you for visiting my Portfolio 🌸

<br>

ทิตชญา ฑีฆะไพบูลย์

</footer>



</body>

</html>
