<style>


*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:'Prompt',sans-serif;

}


body{

min-height:100vh;
background:linear-gradient(135deg,#ffd6e7,#b8f2e6);
color:#2d6a4f;

}


/* Navbar */

header{

position:fixed;
top:0;
width:100%;
padding:20px 8%;

display:flex;
justify-content:space-between;
align-items:center;

background:rgba(255,255,255,.45);
backdrop-filter:blur(15px);

z-index:999;

}


.logo{

font-size:28px;
font-weight:bold;
color:#ff5f9e;

}


nav a{

text-decoration:none;
margin-left:25px;
color:#2d6a4f;
font-weight:500;

}


nav a:hover{

color:#ff5f9e;

}



/* Main */


.container{

padding-top:120px;
width:85%;
margin:auto;

}



/* Title */


.title{

text-align:center;
margin-bottom:40px;

animation:show 1s;

}


.title h1{

font-size:45px;
color:#ff5f9e;

}


.title p{

font-size:18px;

}



/* Profile Card */


.profile-card{

display:flex;
gap:50px;

background:rgba(255,255,255,.45);

backdrop-filter:blur(20px);

padding:40px;

border-radius:35px;

box-shadow:0 20px 40px rgba(0,0,0,.1);

animation:show 1.2s;

}



@keyframes show{

from{

opacity:0;
transform:translateY(50px);

}

to{

opacity:1;
transform:translateY(0);

}

}



.profile-img{

width:120px;
height:120px;

border-radius:50%;

object-fit:cover;

border:8px solid white;

box-shadow:0 10px 30px rgba(0,0,0,.15);

}



.info h2{

color:#ff5f9e;

margin-bottom:20px;

}



.info p{

line-height:2;

font-size:17px;

}



/* Section */


.box{

margin-top:40px;

background:rgba(255,255,255,.45);

backdrop-filter:blur(20px);

padding:35px;

border-radius:30px;

box-shadow:0 15px 30px rgba(0,0,0,.08);


}



.box h2{

color:#ff5f9e;

margin-bottom:20px;

}


.box ul{

line-height:2.2;

padding-left:25px;

font-size:17px;

}



/* Footer */


footer{

margin-top:50px;

text-align:center;

padding:25px;

background:#ffffff88;

}





@media(max-width:800px){


header{

flex-direction:column;

}


nav{

margin-top:15px;

}


.profile-card{

flex-direction:column;

text-align:center;

}



.profile-img{

margin:a;

}



}

</utostyle>


</head>
